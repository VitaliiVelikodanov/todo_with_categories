services:
  backend:
    build: ./backend
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: file:/data/data.sqlite
      PORT: 3001
    volumes:
      - sqlite_data:/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3001
    ports:
      - '8080:80'
    depends_on:
      - backend

volumes:
  sqlite_data:
